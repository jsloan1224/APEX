profiles:
  paper_default:
    traded_instrument: ES                # ES | NQ | YM — single selection (CLI --market overrides)
    context_instruments: [NQ, YM]        # read-only, used for SMT and correlation
    sessions: [LONDON, NY_AM, NY_PM]
    mode: paper
    bias_timeframes: [240, 60, 15]                    # bias chain — all must agree
    fvg_detection_timeframes: [240, 60, 15, 5, 3, 1]  # FVGs detected on all six
    execution_timeframe: 1                              # 1m entry chart
    smt_check_timeframes: [5, 1]                       # SMT divergence checked here
    signal_cutoff_minutes_before_kz_close: 15

    instrument_params:
      ES:
        contracts: 1
        stop_ticks: 20
        target_ticks: 20
        min_target_ticks: 20
        min_fvg_size_ticks: 4
      NQ:
        contracts: 1
        stop_ticks: 20
        target_ticks: 20
        min_target_ticks: 20
        min_fvg_size_ticks: 4
      YM:
        contracts: 1
        stop_ticks: 20
        target_ticks: 20
        min_target_ticks: 20
        min_fvg_size_ticks: 4

  conservative:
    traded_instrument: ES
    context_instruments: [NQ, YM]
    sessions: [NY_AM]
    mode: paper
    bias_timeframes: [60, 15]
    fvg_detection_timeframes: [60, 15, 5, 3, 1]
    execution_timeframe: 1
    smt_check_timeframes: [5, 1]
    signal_cutoff_minutes_before_kz_close: 15
    instrument_params:
      ES:
        contracts: 1
        stop_ticks: 15
        target_ticks: 15
        min_target_ticks: 15
        min_fvg_size_ticks: 4
      NQ:
        contracts: 1
        stop_ticks: 15
        target_ticks: 15
        min_target_ticks: 15
        min_fvg_size_ticks: 4
      YM:
        contracts: 1
        stop_ticks: 15
        target_ticks: 15
        min_target_ticks: 15
        min_fvg_size_ticks: 4

  aggressive:
    traded_instrument: ES
    context_instruments: [NQ, YM]
    sessions: [LONDON, NY_AM, NY_PM]
    mode: paper
    bias_timeframes: [240, 60, 15]
    fvg_detection_timeframes: [240, 60, 15, 5, 3, 1]
    execution_timeframe: 1
    smt_check_timeframes: [5, 1]
    signal_cutoff_minutes_before_kz_close: 15
    instrument_params:
      ES:
        contracts: 2
        stop_ticks: 25
        target_ticks: 25
        min_target_ticks: 25
        min_fvg_size_ticks: 4
      NQ:
        contracts: 2
        stop_ticks: 25
        target_ticks: 25
        min_target_ticks: 25
        min_fvg_size_ticks: 4
      YM:
        contracts: 2
        stop_ticks: 25
        target_ticks: 25
        min_target_ticks: 25
        min_fvg_size_ticks: 4

tick_values:
  ES:
    ticks_per_handle: 4
    tick_size: 0.25
    tick_value_usd: 12.50
    min_tick: 0.25
  NQ:
    ticks_per_handle: 4
    tick_size: 0.25
    tick_value_usd: 5.00
    min_tick: 0.25
  YM:
    ticks_per_handle: 1
    tick_size: 1.0
    tick_value_usd: 5.00
    min_tick: 1.0

sessions:
  LONDON:
    start: '03:00'
    end: '04:00'
    timezone: 'America/New_York'
  NY_AM:
    start: '10:00'
    end: '11:00'
    timezone: 'America/New_York'
  NY_PM:
    start: '14:00'
    end: '15:00'
    timezone: 'America/New_York'

ibkr:
  paper:
    host: '127.0.0.1'
    port: 7497
    client_id: 1
  live:
    host: '127.0.0.1'
    port: 7496
    client_id: 1
  connection_timeout: 30
  reconnect_attempts: 3
  reconnect_delay: 5

risk:
  max_daily_loss_usd: 500
  max_drawdown_usd: 300
  max_consecutive_losses: 3
  cool_off_minutes: 30
  news_window_minutes: 10
  max_open_positions: 1

database:
  path: 'data/apex.db'

logging:
  level: 'INFO'
  log_file: 'logs/apex.log'
  max_bytes: 10485760     # 10 MB
  backup_count: 5

telegram:
  enabled: false
  token: ''
  chat_id: ''

anthropic:
  model: 'claude-haiku-4-5-20251001'
  max_tokens_sentiment: 300
  max_tokens_validation: 200
  temperature: 0
  validation_timeout_seconds: 2.0

dashboard:
  enabled: true
  host: '127.0.0.1'
  port: 8050
  refresh_interval_ms: 1000
